```ini
[General]
# Set the default frame rate limit for CS2
FrameRateLimit=144
# Enable or disable the auto-save feature for settings
AutoSave=true
# Path to CS2 executable, used for launching the game
CS2ExecutablePath=C:\Program Files\Steam\steamapps\common\Counter-Strike Global Offensive\cs2.exe

[Hotkeys]
# Define hotkeys for toggling frame rate limiting
ToggleFrameRateHotkey=F9
# Hotkey to display current frame rate
ShowFrameRateHotkey=F10
# Hotkey to reset frame rate settings to default
ResetSettingsHotkey=F11

[Features]
# Enable V-Sync (Vertical Sync) to reduce screen tearing
EnableVSync=true
# Enable frame rate limiting
EnableFrameRateLimit=true
# Allow use of dynamic frame rate adjustment based on in-game performance
DynamicFrameRateAdjustment=true
# Activate a performance overlay in-game
EnablePerformanceOverlay=true

[Display]
# Set the resolution that the frame rate manager should use
Resolution=1920x1080
# Set the display mode (Fullscreen, Windowed, Borderless)
DisplayMode=Fullscreen
# Adjust the refresh rate according to your monitor
RefreshRate=144
# Set the position of the performance overlay on the screen (x,y)
OverlayPosition=10,10
```